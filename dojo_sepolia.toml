[world]
name = "Zordle"
description = "Lazy adversarial Wordle on Dojo (Sepolia v1)"
seed = "zordle_sepolia_v1"

[namespace]
default = "zordle_0_1"

[writers]
"zordle_0_1" = ["zordle_0_1-actions", "zordle_0_1-setup"]

[env]
rpc_url = "https://api.cartridge.gg/x/starknet/sepolia"
# account_address and private_key are intentionally omitted from this file.
# The deploy script (scripts/deploy_sepolia.sh) reads DEPLOYER_ADDRESS and
# DEPLOYER_PRIVATE_KEY from the shell environment and passes them as
# --account-address / --private-key flags to sozo, so secrets never land in
# version control.

# Wires the actions contract to Cartridge's shared infrastructure on Sepolia:
#   - creator: replaced at deploy time by deploy_sepolia.sh with the deployer
#     address (used by Denshokan for game-creator metadata).
#   - Denshokan: shared MinigameToken contract — mints the per-game NFT.
#   - renderer: 0x1 == Option::None — fall back to Denshokan's default SVG.
#   - VRF: Cartridge VRF provider — replaces poseidon for guess-bucket pick.
[init_call_args]
"zordle_0_1-actions" = [
    "0x047dc688Abc3E6e58ed9F0171dE5aeCd22C08E8A08c469B2bb2267C9E7af1813",
    "0x0004e6e5bbf18424dfb825f1dbb65e10473b4603a1ec7b9ab02c143d877114f9",
    "0x1",
    "0x051fea4450da9d6aee758bdeba88b2f665bcbf549d2c61421aa724e9ac0ced8f",
]
# scripts/deploy_sepolia.sh replaces this with DEPLOYER_ADDRESS before
# running `sozo migrate`, then restores the checked-in file.
"zordle_0_1-setup" = [
    "0x047dc688Abc3E6e58ed9F0171dE5aeCd22C08E8A08c469B2bb2267C9E7af1813",
]
