[workspace]
members = ["contracts"]

[workspace.package]
edition = "2024_07"
cairo-version = "2.15.0"

[workspace.dependencies]
starknet = "2.15.0"
dojo = "1.8.0"
dojo_cairo_test = "1.8.0"
cairo_test = "2.15.0"

# OpenZeppelin — needed because game_components_embeddable_game_standard
# embeds an SRC5Component (introspection) into our actions contract.
openzeppelin_introspection = { git = "https://github.com/OpenZeppelin/cairo-contracts.git", tag = "v3.0.0" }

# Provable Games — the MinigameComponent + IMinigameTokenData traits that
# let our contract speak to Denshokan / Budokan leaderboards.
game_components_embeddable_game_standard = { git = "https://github.com/Provable-Games/game-components.git", branch = "main" }
game_components_interfaces = { git = "https://github.com/Provable-Games/game-components.git", branch = "main" }

[workspace.cairo]
sierra-replace-ids = true

[profile.dev]

# Sepolia release profile — same Cairo settings as dev. The world-level
# differences (RPC, seed) live in dojo_sepolia.toml.
[profile.sepolia]
